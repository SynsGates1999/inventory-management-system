server.port=8081
spring.application.name=inventory-management-system

# ===================================================================
# CONFIGURATION DATABASE POSTGRESQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5433/inventory_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURATION JPA / HIBERNATE
# ===================================================================
# Menggunakan 'validate' karena struktur tabel dikelola penuh oleh Flyway (bukan auto-create oleh Hibernate)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURATION FLYWAY MIGRATION
# ===================================================================
spring.flyway.enabled=true
# Mengizinkan Flyway membuat tabel riwayat pencatatan jika belum ada
spring.flyway.baseline-on-migrate=true

spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=USER

# JWT Security Configuration
app.jwt.secret=Zm9yLXRlc3RpbmctcHVycG9zZXMtb25seS1kZXZlbG9wbWVudC1zZWNyZXQta2V5LTEyMzQ1Njc4OTA=
app.jwt.expiration-ms=86400000

